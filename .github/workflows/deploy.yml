name: Build Push and Update Helm

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t flask-ecs-app:${IMAGE_TAG} .

      - name: Tag Docker image
        run: |
          docker tag flask-ecs-app:${IMAGE_TAG} 437158669342.dkr.ecr.ap-south-1.amazonaws.com/flask-ecs-app:${IMAGE_TAG}

      - name: Push Docker image to ECR
        run: |
          docker push 437158669342.dkr.ecr.ap-south-1.amazonaws.com/flask-ecs-app:${IMAGE_TAG}

      - name: Update Helm image tag
        run: |
          sed -i "s/tag: .*/tag: ${IMAGE_TAG}/" flask-chart/values.yaml

      - name: Commit updated Helm chart
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add flask-chart/values.yaml
          git commit -m "Update image tag to ${IMAGE_TAG}" || echo "No changes to commit"
          git push
