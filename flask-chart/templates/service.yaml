apiVersion: v1
kind: Service
metadata:
  name: flask-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "{{ .Values.service.targetPort }}"

spec:
  type: {{ .Values.service.type }}

  selector:
    app: flask

  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
